<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 220" width="100%" height="100%" style="background: transparent;">
  <defs>
    <!-- Gradients -->
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#eab308" />
      <stop offset="100%" stop-color="#ca8a04" />
    </linearGradient>
    <linearGradient id="slateGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#475569" />
      <stop offset="100%" stop-color="#1e293b" />
    </linearGradient>
  </defs>

  <g transform="translate(10, 10)" fill="none" stroke-linejoin="round" stroke-linecap="round">
    
    <!-- LETTER T: Thor's Hammer (Mjolnir) -->
    <g id="letter-t" transform="translate(20, 0)">
      <!-- Leather loop at handle base -->
      <path d="M 82,165 C 82,185 88,185 88,165" stroke="#334155" stroke-width="2.5" />
      <!-- Handle -->
      <rect x="79" y="48" width="12" height="117" rx="3" fill="#334155" />
      <!-- Grip wraps -->
      <line x1="79" y1="75" x2="91" y2="78" stroke="#94a3b8" stroke-width="1.5" />
      <line x1="79" y1="95" x2="91" y2="98" stroke="#94a3b8" stroke-width="1.5" />
      <line x1="79" y1="115" x2="91" y2="118" stroke="#94a3b8" stroke-width="1.5" />
      <line x1="79" y1="135" x2="91" y2="138" stroke="#94a3b8" stroke-width="1.5" />
      <!-- Rubber bottom base -->
      <rect x="77" y="152" width="16" height="13" rx="1.5" fill="#1e293b" />

      <!-- Hammer Head (Beveled Mjolnir Block) -->
      <path d="M 35,22 L 135,22 L 140,28 L 140,42 L 135,48 L 35,48 L 30,42 L 30,28 Z" fill="#334155" stroke="url(#goldGrad)" stroke-width="2" />
      <!-- Engraving/Runes details -->
      <line x1="85" y1="22" x2="85" y2="48" stroke="url(#goldGrad)" stroke-width="1.5" opacity="0.8" />
      <circle cx="85" cy="35" r="3.5" fill="url(#goldGrad)" stroke="none" />
      <!-- Left/Right trim lines -->
      <line x1="50" y1="26" x2="50" y2="44" stroke="#94a3b8" stroke-width="1" opacity="0.6" />
      <line x1="120" y1="26" x2="120" y2="44" stroke="#94a3b8" stroke-width="1" opacity="0.6" />
    </g>

    <!-- LETTER M: Contour Mapping Lines -->
    <g id="letter-m" transform="translate(200, 20)">
      <!-- Contour 1 (Outer M) -->
      <path d="M 10,150 L 10,20 L 75,100 L 140,20 L 140,150" stroke="url(#goldGrad)" stroke-width="4.5" />
      <!-- Contour 2 -->
      <path d="M 25,150 L 25,45 L 75,115 L 125,45 L 125,150" stroke="#475569" stroke-width="3.5" opacity="0.9" />
      <!-- Contour 3 -->
      <path d="M 40,150 L 40,70 L 75,130 L 110,70 L 110,150" stroke="url(#goldGrad)" stroke-width="2.5" opacity="0.8" />
      <!-- Contour 4 -->
      <path d="M 55,150 L 55,95 L 75,145 L 95,95 L 95,150" stroke="#475569" stroke-width="1.5" opacity="0.7" />
    </g>

    <!-- LETTER P: Network Protocol (Rounded loop path with nodes) -->
    <g id="letter-p" transform="translate(390, 20)">
      <!-- Rounded P backbone path -->
      <path d="M 20,20 L 20,150" stroke="#334155" stroke-width="3.5" />
      <!-- Rounded loop -->
      <path d="M 20,20 L 70,20 C 105,20 120,40 120,55 C 120,70 105,90 70,90 L 20,90" stroke="#334155" stroke-width="3.5" />

      <!-- Network Mesh internal connections -->
      <g stroke="#475569" stroke-width="2" opacity="0.7">
        <line x1="20" y1="20" x2="70" y2="90" />
        <line x1="20" y1="90" x2="70" y2="20" />
        <line x1="20" y1="55" x2="115" y2="55" />
        <line x1="70" y1="20" x2="70" y2="90" />
      </g>

      <!-- Nodes (Gold circles) -->
      <!-- Stem nodes -->
      <circle cx="20" cy="20" r="6.5" fill="url(#goldGrad)" />
      <circle cx="20" cy="55" r="6.5" fill="url(#goldGrad)" />
      <circle cx="20" cy="90" r="6.5" fill="url(#goldGrad)" />
      <circle cx="20" cy="120" r="6.5" fill="url(#goldGrad)" />
      <circle cx="20" cy="150" r="6.5" fill="url(#goldGrad)" />
      <!-- Loop nodes -->
      <circle cx="70" cy="20" r="6.5" fill="url(#goldGrad)" />
      <circle cx="100" cy="30" r="6.5" fill="url(#goldGrad)" />
      <circle cx="115" cy="55" r="6.5" fill="url(#goldGrad)" />
      <circle cx="100" cy="80" r="6.5" fill="url(#goldGrad)" />
      <circle cx="70" cy="90" r="6.5" fill="url(#goldGrad)" />
      <circle cx="70" cy="55" r="6.5" fill="url(#goldGrad)" />
    </g>

  </g>
</svg>
